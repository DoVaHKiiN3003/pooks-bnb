  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: #0a0a08; color: #fffbeb; overflow-x: hidden; }
    main { overflow-x: hidden; width: 100%; max-width: 100%; }
    
    .glass-pill {
      background: rgba(10, 10, 8, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 251, 235, 0.08);
      border-radius: 9999px;
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #d4af37, #f5e6a3, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .hero-overlay {
      background: linear-gradient(180deg, rgba(10,10,8,0.65) 0%, rgba(10,10,8,0.35) 40%, rgba(10,10,8,0.5) 70%, rgba(10,10,8,0.95) 100%);
    }
    
    .hero-tint {
      background: radial-gradient(ellipse at 50% 30%, rgba(212,175,55,0.08) 0%, transparent 60%);
      mix-blend-mode: overlay;
    }
    
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-flow: dense;
      gap: 1.5rem;
    }
    
    .bento-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,251,235,0.06);
      transition: transform 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    
    .bento-card:hover {
      transform: scale(1.02);
    }
    
    .bento-card img {
      transition: transform 0.7s cubic-bezier(0.16,1,0.3,1), filter 0.5s ease;
    }
    
    .bento-card:hover img {
      transform: scale(1.05);
      filter: brightness(1.1);
    }
    
    .marquee-track {
      display: flex;
      animation: marquee 30s linear infinite;
      width: max-content;
    }
    
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    
    .accordion-slice {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: flex 0.7s cubic-bezier(0.16,1,0.3,1);
      flex: 1;
      min-width: 80px;
    }
    
    .accordion-slice.active {
      flex: 4;
    }
    
    .accordion-slice img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    
    .accordion-slice.active img {
      transform: scale(1.05);
    }
    
    .accordion-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem;
      background: linear-gradient(transparent, rgba(10,10,8,0.9));
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    
    .accordion-slice.active .accordion-content {
      opacity: 1;
    }
    
    .testimonial-card {
      flex-shrink: 0;
      transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.5s ease;
    }
    
    .testimonial-card:hover {
      transform: translateY(-8px);
    }
    
    .scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, #d4af37, #f5e6a3);
      z-index: 9999;
      width: 0%;
    }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a08; }
    ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.25); border-radius: 3px; }
    
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='512' height='512' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }
  </style>
